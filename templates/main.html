<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for( 'static', filename='main.css')}}">
    <title>Student Helper</title>
</head>
<body>
    <div class="container">
        <aside class="left-section">
            <h1>Помощник студента</h1>
            <div class="sidebar">
                <a id="active" href="{{ url_for('main')}}">Главная</a>
                <a href="{{ url_for('mytasks')}}">Мои задачи</a>
                <a href="{{ url_for('finished')}}">Выполненные задачи</a>
                <a href="{{ url_for('statistics')}}">Статистика</a>
                <a id="exit" href="{{ url_for('logout')}}">Выйти</a>
            </div>
        </aside>

        <main>
            <div class="adder">
                <div class="item">
                    <form id="addSubjectForm">
                        <p>+ предмет</p>
                        <input type="text" id="subjectName" placeholder="учебный предмет" required>
                        <button type="submit">Добавить</button>
                    </form>
                </div>

                <div class="item">
                    <form id="addTaskForm">
                        <p>+ задание</p>
                        <label for="subjectSelect">Предмет:</label>
                        <select name="subject" id="subjectSelect" required>
                            <!-- будет заполнено JS -->
                            <option value="">Выберите предмет</option>
                        </select>
                        <label for="taskDescription">Задание:</label>
                        <input type="text" id="taskDescription" placeholder="задание" required>
                        <label for="taskDeadline">Дедлайн:</label>
                        <input type="date" id="taskDeadline" min="2026-05-05" required>
                        <button type="submit">Добавить</button>
                    </form>
                </div>
            </div>
        </main>

        <aside class="right-section">
            <h2>Ближайшие дедлайны:</h2>
            <div id="deadlineList" class="deadline-list">
                <!-- Сюда будет вставляться HTML через JS -->
                <p id="loading">Загрузка задач...</p>
            </div>
        </aside>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
